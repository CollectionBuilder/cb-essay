{% assign iterator = site[page.essay-collection] | default: site.data[page.essay-csv] %}
<script>
    var scrolly = document.querySelector("#scrolly");
            var article = scrolly.querySelector("article");
            var step = article.querySelectorAll(".step");

            // initialize the scrollama
            var scroller = scrollama();

    // Trigger offset must match scroller.setup offset below
    var SCROLLY_OFFSET = 0.24;

    // Drive scroll-linked transforms. Called from scroll listener and on step enter.
    // p is 0 (step just entered trigger) → 1 (step about to exit trigger).
    function applyProgressTransform(imgEl, animate, p) {
        switch (animate) {
            case 'zoom-in':
                imgEl.style.transform = 'scale(' + (1 + p * 0.7) + ')';
                break;
            case 'zoom-out':
                imgEl.style.transform = 'scale(' + (1.7 - p * 0.7) + ')';
                break;
            case 'pan-right':
                imgEl.style.transform = '';
                imgEl.style.objectPosition = (p * 100) + '% 50%';
                break;
            case 'pan-left':
                imgEl.style.transform = '';
                imgEl.style.objectPosition = ((1 - p) * 100) + '% 50%';
                break;
            case 'ken-burns':
                imgEl.style.transform = 'scale(' + (1 + p * 0.5) + ')';
                imgEl.style.objectPosition = (30 + p * 35) + '% ' + (60 - p * 25) + '%';
                break;
        }
    }

    // scrollama event handlers
    function handleStepEnter(response) {
        var stepIndex = response.index;

        // Add fade-in effect to the current step
        response.element.classList.add("fade-in");

        // Scrolly steps: swap sticky image + apply focus/animate using pre-computed src lookup
        if (response.element.classList.contains('scrolly-step')) {
            var section = response.element.closest('.scrolly-section');
            var imgEl = section ? section.querySelector('.scrolly-sticky__img') : null;
            if (imgEl && section._scrollySrcs) {
                var idx = section._scrollySteps.indexOf(response.element);
                section._activeScrollyStepIdx = idx; // scroll handler reads this
                var targetSrc = section._scrollySrcs[idx];
                var stepFocus   = response.element.getAttribute('data-focus');   // null if not set
                var stepAnimate = response.element.getAttribute('data-animate'); // null if not set
                if (targetSrc && imgEl.getAttribute('src') !== targetSrc) {
                    imgEl.style.opacity = '0';
                    setTimeout(function() {
                        imgEl.src = targetSrc;
                        if (stepFocus !== null) { imgEl.style.objectPosition = stepFocus; imgEl.style.transformOrigin = stepFocus; }
                        if (stepAnimate) { applyProgressTransform(imgEl, stepAnimate, 0); }
                        imgEl.style.opacity = '1';
                    }, 380);
                } else {
                    if (stepFocus   !== null) { imgEl.style.objectPosition = stepFocus; imgEl.style.transformOrigin = stepFocus; }
                    if (stepAnimate !== null) { applyProgressTransform(imgEl, stepAnimate, 0); }
                }
            }
            response.element.classList.remove("fade-out");
            return;
        }

        // Check if the element has the data-background-color attribute
        const bgColor = response.element.getAttribute("data-background-color");
        if (bgColor) {
            // If it exists, change the body background color
            document.body.style.backgroundColor = bgColor;
        } else {
            document.body.style.backgroundColor = "white";
        }

        // Apply specific styles for even steps
        if (stepIndex == 0) {}
        {% for s in iterator %}
        else if (stepIndex == {{forloop.index0}}) {
        {% if s.background-color %}document.body.style.backgroundColor = "{{s.background-color}}";{% else %}
         document.body.style.backgroundColor = "white";{% endif %}
        {% if s.text-color %}document.body.style.color = "{{s.text-color}}";{% else %}
        document.body.style.color = "black";{% endif %}
        }{% endfor %}

        // Remove fade-out class if it exists
        response.element.classList.remove("fade-out");
    }

    function handleStepExit(response) {

    }

    // Initialize scrollama and set up event listeners
    function init() {
        step.forEach(function(step, index) {
            // Scrolly steps have their spacing managed by CSS
            if (step.classList.contains('scrolly-step')) return;
            // Skip padding for the first step
            if (index === 0) {
                step.style.padding = "30px 0px";
            } else {
                var v = 100 + Math.floor((Math.random() * window.innerHeight) / 4);
                step.style.padding = v + "px 0px";
            }
        });

        // Pre-compute effective image for each scrolly-step so scroll-up works correctly.
        // Each step's "effective image" is the last data-src seen at or before that step.
        document.querySelectorAll('.scrolly-section').forEach(function(section) {
            var img = section.querySelector('.scrolly-sticky__img');
            if (!img) return;
            var sectionSteps = Array.from(section.querySelectorAll('.scrolly-step'));
            var lastSrc = img.getAttribute('src');
            var srcs = sectionSteps.map(function(s) {
                var stepSrc = s.getAttribute('data-src');
                if (stepSrc) lastSrc = stepSrc;
                return lastSrc;
            });
            section._scrollySrcs = srcs;
            section._scrollySteps = sectionSteps;
            section._activeScrollyStepIdx = undefined;
        });

        scroller
            .setup({
                step: "#scrolly article .step",
                debug: false,
                offset: SCROLLY_OFFSET
            })
            .onStepEnter(handleStepEnter)
            .onStepExit(handleStepExit);

        // Scroll-driven image animation: compute progress from getBoundingClientRect
        // so it works correctly at any step height (Scrollama's intersectionRatio
        // maxes out at viewport/stepHeight, unreliable for tall steps like 300vh).
        var rafPending = false;
        window.addEventListener('scroll', function() {
            if (rafPending) return;
            rafPending = true;
            requestAnimationFrame(function() {
                rafPending = false;
                document.querySelectorAll('.scrolly-section').forEach(function(section) {
                    var idx = section._activeScrollyStepIdx;
                    if (idx === undefined || !section._scrollySteps) return;
                    var activeStep = section._scrollySteps[idx];
                    if (!activeStep) return;
                    var animate = activeStep.getAttribute('data-animate');
                    if (!animate) return;
                    var imgEl = section.querySelector('.scrolly-sticky__img');
                    if (!imgEl) return;
                    var rect = activeStep.getBoundingClientRect();
                    var triggerY = window.innerHeight * SCROLLY_OFFSET;
                    // p = 0 when step top hits trigger; p = 1 when step bottom hits trigger
                    var p = Math.max(0, Math.min(1, (triggerY - rect.top) / rect.height));
                    applyProgressTransform(imgEl, animate, p);
                });
            });
        }, { passive: true });
    }

    // Kick things off
    init();

</script>
