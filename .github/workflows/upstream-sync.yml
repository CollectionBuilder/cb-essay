name: Upstream Sync from CollectionBuilder-CSV

on:
  schedule:
    # Mondays at 14:00 UTC (07:00 Pacific). Weekly is plenty.
    - cron: '0 14 * * 1'
  workflow_dispatch:
    inputs:
      base_ref:
        description: 'Upstream ref to sync from (default: main)'
        required: false
        default: 'main'

permissions:
  contents: write
  pull-requests: write

env:
  UPSTREAM_REPO: https://github.com/CollectionBuilder/collectionbuilder-csv.git
  UPSTREAM_BRANCH: ${{ github.event.inputs.base_ref || 'main' }}

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout cb-essay
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "cb-upstream-sync[bot]"
          git config user.email "cb-upstream-sync@users.noreply.github.com"

      - name: Add upstream remote and fetch
        run: |
          git remote add upstream "$UPSTREAM_REPO"
          git fetch upstream "$UPSTREAM_BRANCH"

      - name: Determine sync branch name
        id: branch
        run: |
          DATE=$(date +%Y-%m-%d)
          UPSTREAM_SHA=$(git rev-parse --short upstream/${UPSTREAM_BRANCH})
          BRANCH="upstream-sync/${DATE}-${UPSTREAM_SHA}"
          echo "branch=${BRANCH}" >> "$GITHUB_OUTPUT"
          echo "upstream_sha=${UPSTREAM_SHA}" >> "$GITHUB_OUTPUT"

      - name: Check if there is anything new upstream
        id: diffcheck
        run: |
          # Compare upstream to our main; if no new commits touch tracked paths, exit clean.
          CHANGED=$(git diff --name-only HEAD..upstream/${UPSTREAM_BRANCH} -- \
            ':(glob)_includes/**' \
            ':(glob)_layouts/**' \
            ':(glob)_plugins/**' \
            ':(glob)_sass/**' \
            ':(glob)assets/lib/**' \
            ':(glob)assets/css/cb*' \
            ':(glob)_data/config-metadata.csv' \
            ':(glob)_data/theme.yml' \
            ':(exclude)_includes/essay/**' \
            ':(exclude)_includes/cb-essay/**' \
          )
          if [ -z "$CHANGED" ]; then
            echo "No tracked-path changes upstream. Nothing to sync."
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            # Save the file list for the PR body
            echo "$CHANGED" > /tmp/changed-files.txt
          fi

      - name: Create sync branch and merge upstream
        if: steps.diffcheck.outputs.has_changes == 'true'
        id: merge
        run: |
          git checkout -b "${{ steps.branch.outputs.branch }}"
          # Attempt merge but don't fail the job on conflicts — we want the PR either way.
          if git merge --no-edit --no-ff --allow-unrelated-histories upstream/${UPSTREAM_BRANCH} -m "Upstream sync from collectionbuilder-csv@${{ steps.branch.outputs.upstream_sha }}"; then
            echo "conflicts=false" >> "$GITHUB_OUTPUT"
          else
            echo "conflicts=true" >> "$GITHUB_OUTPUT"
            # Capture conflicted files for the PR body, then commit the conflict markers
            # so the PR is openable and a human can resolve.
            git diff --name-only --diff-filter=U > /tmp/conflicted-files.txt || true
            git add -A
            git commit -m "Upstream sync from collectionbuilder-csv@${{ steps.branch.outputs.upstream_sha }} (CONFLICTS — needs manual resolution)" || true
          fi

      - name: Restore essay-specific paths from main
        if: steps.diffcheck.outputs.has_changes == 'true'
        run: |
          # Even if the merge touched these paths, we never want upstream to overwrite them.
          # If they were touched, restore from main (HEAD~1 of the sync branch = our pre-merge state).
          PROTECTED_PATHS=(
            "_includes/essay"
            "_includes/cb-essay"
            "_layouts/essay.html"
            "_data/essays.csv"
            "essays"
            "README.md"
            "Agents.md"
            ".github/workflows"
          )
          for p in "${PROTECTED_PATHS[@]}"; do
            if [ -e "$p" ] || git show HEAD~1:"$p" >/dev/null 2>&1; then
              # Restore from the pre-merge commit (our main)
              git checkout HEAD~1 -- "$p" 2>/dev/null || true
            fi
          done
          # Commit any restorations
          if ! git diff --cached --quiet || ! git diff --quiet; then
            git add -A
            git commit -m "Preserve cb-essay-specific paths from main" || true
          fi

      - name: Push sync branch
        if: steps.diffcheck.outputs.has_changes == 'true'
        run: |
          git push origin "${{ steps.branch.outputs.branch }}" --force-with-lease

      - name: Build PR body
        if: steps.diffcheck.outputs.has_changes == 'true'
        id: prbody
        run: |
          {
            echo "## Automated upstream sync"
            echo ""
            echo "Pulling changes from \`CollectionBuilder/collectionbuilder-csv@${{ steps.branch.outputs.upstream_sha }}\`."
            echo ""
            if [ "${{ steps.merge.outputs.conflicts }}" = "true" ]; then
              echo "### ⚠️ Merge conflicts detected"
              echo ""
              echo "The following files have conflict markers and need manual resolution before merging:"
              echo ""
              echo '```'
              cat /tmp/conflicted-files.txt 2>/dev/null || echo "(see git status)"
              echo '```'
              echo ""
            else
              echo "### ✅ Clean merge"
              echo ""
            fi
            echo "### Files changed upstream (tracked paths only)"
            echo ""
            echo '```'
            cat /tmp/changed-files.txt
            echo '```'
            echo ""
            echo "### Review checklist"
            echo ""
            echo "- [ ] Did upstream touch anything that conflicts with our theming work in \`_sass/\` or \`_includes/\`?"
            echo "- [ ] Did the gem versions / \`Gemfile.lock\` change?"
            echo "- [ ] Are there changes to \`_config.yml\` that need to be reconciled against our essay config?"
            echo "- [ ] Did anything in \`_data/config-metadata.csv\` or \`_data/theme.yml\` change in ways that affect existing essays?"
            echo "- [ ] Build site locally and confirm essays render correctly before merging."
            echo ""
            echo "---"
            echo "*This PR was opened by the upstream-sync workflow. Close it without merging if the changes shouldn't propagate.*"
          } > /tmp/pr-body.md
          # Pass file path to next step
          echo "body_file=/tmp/pr-body.md" >> "$GITHUB_OUTPUT"

      - name: Create or update pull request
        if: steps.diffcheck.outputs.has_changes == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: ${{ steps.branch.outputs.branch }}
          base: main
          title: "Upstream sync from collectionbuilder-csv (${{ steps.branch.outputs.upstream_sha }})"
          body-path: /tmp/pr-body.md
          labels: |
            upstream-sync
            needs-review
          draft: ${{ steps.merge.outputs.conflicts == 'true' }}

      - name: Summary
        if: steps.diffcheck.outputs.has_changes != 'true'
        run: echo "No upstream changes to sync. Exiting clean."
